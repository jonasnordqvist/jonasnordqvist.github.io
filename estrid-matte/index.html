<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lär-Appen</title>
    <style>
        :root {
            --bg: #f9fafb;
            --surface: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #e5e7eb;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --danger: #dc2626;
            --danger-bg: #fee2e2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .menu-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        #progressInfo {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #questionText {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        #visualContent {
            margin-bottom: 1.5rem;
        }

        .grid-fraction {
            display: grid;
            gap: 2px;
            margin: 0 auto;
            justify-content: center;
            width: fit-content;
        }

        .grid-cell {
            width: 40px;
            height: 40px;
            border-radius: 4px;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            font-size: 1.25rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--muted);
            margin-top: 1rem;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        #resultScore {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            margin: 1.5rem 0;
        }

        #reportList {
            text-align: left;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .report-item {
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            border: 1px solid;
        }

        .report-item.correct {
            background: var(--success-bg);
            border-color: var(--success);
            color: #14532d;
        }

        .report-item.incorrect {
            background: var(--danger-bg);
            border-color: var(--danger);
            color: #7f1d1d;
        }

        .report-meta {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            font-weight: 600;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="menuSection">
            <h1>Välj Ämne</h1>
            <div class="menu-grid">
                <button onclick="appState.startSession('math')">Matematik</button>
                <button onclick="appState.startSession('english')">Engelska Glosor</button>
            </div>
        </div>

        <div id="quizSection" class="hidden">
            <div id="progressInfo"></div>
            <div id="questionText"></div>
            <div id="visualContent"></div>
            <form id="answerForm">
                <input type="text" id="answerInput" autocomplete="off" required>
                <button type="submit">Svara</button>
            </form>
            <button class="btn-secondary" onclick="appState.returnToMenu()">Avbryt</button>
        </div>

        <div id="resultSection" class="hidden">
            <h1>Testet är klart!</h1>
            <div id="resultScore"></div>
            <div id="reportList"></div>
            <button onclick="appState.startSession(appState.currentSubjectKey)">Börja ny omgång</button>
            <button class="btn-secondary" onclick="appState.returnToMenu()">Till Huvudmenyn</button>
        </div>
    </div>

    <script>
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const numToSwedish = (num) => {
            const ones = ["", "ett", "två", "tre", "fyra", "fem", "sex", "sju", "åtta", "nio"];
            const teens = ["tio", "elva", "tolv", "tretton", "fjorton", "femton", "sexton", "sjutton", "arton", "nitton"];
            const tens = ["", "tio", "tjugo", "trettio", "fyrtio", "femtio", "sextio", "sjuttio", "åttio", "nittio"];
            const build99 = (n) => {
                if (n < 10) return ones[n];
                if (n < 20) return teens[n - 10];
                return tens[Math.floor(n / 10)] + ones[n % 10];
            };
            const build999 = (n) => {
                if (n < 100) return build99(n);
                const h = Math.floor(n / 100);
                return (h === 1 ? "etthundra" : ones[h] + "hundra") + build99(n % 100);
            };
            const th = Math.floor(num / 1000);
            return (th === 1 ? "ettusen" : ones[th] + "tusen") + build999(num % 1000);
        };

        const mathGenerators = [
            () => {
                const number = randomInt(1100, 9999);
                return { text: `Skriv talet med siffror: ${numToSwedish(number)}`, answer: number.toString(), type: 'standard' };
            },
            () => {
                const h = randomInt(8, 16);
                const m = randomInt(0, 11) * 5;
                const addM = randomInt(1, 11) * 5;
                let endH = h;
                let endM = m + addM;
                if (endM >= 60) { endM -= 60; endH += 1; }
                const format = (hrs, mins) => `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
                return { text: `Klockan är ${format(h, m)}. Vad är klockan om ${addM} minuter?`, answer: format(endH, endM), type: 'standard' };
            },
            () => {
                const cols = randomInt(2, 5);
                const rows = randomInt(2, 3);
                const total = cols * rows;
                const filled = randomInt(1, total - 1);
                let cells = Array(total).fill(false).fill(true, 0, filled);
                cells.sort(() => Math.random() - 0.5);
                const gridHtml = `<div class="grid-fraction" style="grid-template-columns: repeat(${cols}, 40px);">${cells.map(c => `<div class="grid-cell" style="background: ${c ? 'var(--primary)' : 'var(--border)'};"></div>`).join('')}</div>`;
                return { text: `Hur stor andel av figuren är fylld?<br><span style="font-size:1rem;font-weight:normal;">Svara som ett bråk (t.ex. 1/2)</span>`, visual: gridHtml, type: 'fraction', num: filled, den: total, answer: `${filled}/${total}` };
            },
            () => {
                const x = randomInt(10, 100);
                const a = randomInt(10, 150);
                return { text: `x + ${a} = ${x + a}<br>Vad är x?`, answer: x.toString(), type: 'standard' };
            },
            () => {
                const count = randomInt(3, 5);
                let sum = 0;
                let nums = [];
                for (let i = 0; i < count; i++) {
                    const n = randomInt(2, 12);
                    nums.push(n);
                    sum += n;
                }
                const rem = sum % count;
                if (rem !== 0) { nums[0] += (count - rem); sum += (count - rem); }
                return { text: `Beräkna medelvärdet av talen: ${nums.join(', ')}`, answer: (sum / count).toString(), type: 'standard' };
            },
            () => {
                const subTypes = [
                    () => { const q = randomInt(2, 6); return { text: `Hur många månader är ${q} kvartal?`, answer: (q * 3).toString() }; },
                    () => { const h = randomInt(2, 5); const m = randomInt(1, 59); return { text: `Hur många minuter är ${h} h och ${m} min?`, answer: (h * 60 + m).toString() }; },
                    () => { const d = [2, 3, 4, 6, 8, 12][randomInt(0, 5)]; return { text: `Hur många timmar är 1/${d} dygn?`, answer: (24 / d).toString() }; },
                    () => { const h = randomInt(1, 4); const m = randomInt(1, 59); return { text: `Skriv ${h * 60 + m} minuter i timmar och minuter.<br><span style="font-size:1rem;font-weight:normal;">Svara i formatet h:mm (t.ex. 2:15)</span>`, answer: `${h}:${m.toString().padStart(2, '0')}` }; }
                ];
                return { ...subTypes[randomInt(0, subTypes.length - 1)](), type: 'standard' };
            },
            () => { const a = randomInt(100, 999); const b = randomInt(100, 999); return { text: `${a} + ${b}`, answer: (a + b).toString(), type: 'standard' }; },
            () => { const a = randomInt(200, 999); const b = randomInt(100, a - 1); return { text: `${a} - ${b}`, answer: (a - b).toString(), type: 'standard' }; },
            () => { const a = randomInt(2, 9); const b = randomInt(100, 999); return { text: `${a} · ${b}`, answer: (a * b).toString(), type: 'standard' }; },
            () => { const a = randomInt(2, 9); const ans = randomInt(20, 150); return { text: `${a * ans} / ${a}`, answer: ans.toString(), type: 'standard' }; }
        ];

        // NOTE: Add more words here or fetch from an external JSON file later
        const englishVocabulary = [
            { sv: "bil", en: "car" }, { sv: "äpple", en: "apple" }, { sv: "fönster", en: "window" },
            { sv: "tåg", en: "train" }, { sv: "bok", en: "book" }, { sv: "vatten", en: "water" },
            { sv: "vän", en: "friend" }, { sv: "stad", en: "city" }, { sv: "träd", en: "tree" },
            { sv: "dator", en: "computer" }
        ];

        const generateEnglishQuestion = () => {
            const wordPair = englishVocabulary[randomInt(0, englishVocabulary.length - 1)];
            return { text: `Översätt till engelska:<br><strong>${wordPair.sv}</strong>`, answer: wordPair.en, type: 'standard' };
        };

        const subjectModules = {
            math: { questionsPerSession: 10, generate: () => mathGenerators[randomInt(0, mathGenerators.length - 1)]() },
            english: { questionsPerSession: 5, generate: generateEnglishQuestion }
        };

        const dom = {
            menu: document.getElementById('menuSection'),
            quiz: document.getElementById('quizSection'),
            result: document.getElementById('resultSection'),
            progress: document.getElementById('progressInfo'),
            questionText: document.getElementById('questionText'),
            visualContent: document.getElementById('visualContent'),
            answerInput: document.getElementById('answerInput'),
            answerForm: document.getElementById('answerForm'),
            resultScore: document.getElementById('resultScore'),
            reportList: document.getElementById('reportList')
        };

        const appState = {
            currentSubjectKey: null,
            sessionQuestions: [],
            currentQuestionIndex: 0,
            currentScore: 0,

            startSession(subjectKey) {
                this.currentSubjectKey = subjectKey;
                const subject = subjectModules[subjectKey];
                this.sessionQuestions = Array.from({ length: subject.questionsPerSession }, () => subject.generate());
                this.currentQuestionIndex = 0;
                this.currentScore = 0;
                this.switchView('quiz');
                this.renderQuestion();
            },

            renderQuestion() {
                const q = this.sessionQuestions[this.currentQuestionIndex];
                dom.progress.textContent = `Fråga ${this.currentQuestionIndex + 1} av ${this.sessionQuestions.length}`;
                dom.questionText.innerHTML = q.text;
                dom.visualContent.innerHTML = q.visual || '';
                dom.visualContent.className = q.visual ? '' : 'hidden';
                dom.answerInput.value = '';
                dom.answerInput.focus();
            },

            evaluateAnswer(q, userInput) {
                const cleanInput = userInput.replace(/\s+/g, '').toLowerCase();
                if (q.type === 'fraction') {
                    const parts = cleanInput.split('/');
                    return parts.length === 2 && (parseInt(parts[0], 10) * q.den) === (q.num * parseInt(parts[1], 10));
                }
                return cleanInput === q.answer.toLowerCase();
            },

            handleSubmission(e) {
                e.preventDefault();
                const q = this.sessionQuestions[this.currentQuestionIndex];
                q.userAnswer = dom.answerInput.value;
                q.isCorrect = this.evaluateAnswer(q, dom.answerInput.value);
                if (q.isCorrect) this.currentScore++;
                this.currentQuestionIndex++;
                if (this.currentQuestionIndex < this.sessionQuestions.length) {
                    this.renderQuestion();
                } else {
                    this.showResults();
                }
            },

            showResults() {
                this.switchView('result');
                dom.resultScore.textContent = `${this.currentScore} / ${this.sessionQuestions.length}`;
                dom.reportList.innerHTML = '';
                this.sessionQuestions.forEach((q, idx) => {
                    const item = document.createElement('div');
                    item.className = `report-item ${q.isCorrect ? 'correct' : 'incorrect'}`;
                    const visualNote = q.type === 'fraction' ? ' (figur)' : '';
                    item.innerHTML = `
                        <div><strong>${idx + 1}.</strong> ${q.text.replace(/<br>/g, ' ')}${visualNote}</div>
                        <div class="report-meta">Ditt svar: ${q.userAnswer || '-'} | Korrekt svar: ${q.type === 'fraction' ? q.answer + ' (eller likvärdigt)' : q.answer}</div>
                    `;
                    dom.reportList.appendChild(item);
                });
            },

            switchView(viewName) {
                dom.menu.classList.add('hidden');
                dom.quiz.classList.add('hidden');
                dom.result.classList.add('hidden');
                dom[viewName].classList.remove('hidden');
            },

            returnToMenu() {
                this.switchView('menu');
            }
        };

        dom.answerForm.addEventListener('submit', (e) => appState.handleSubmission(e));
    </script>
</body>

</html>
